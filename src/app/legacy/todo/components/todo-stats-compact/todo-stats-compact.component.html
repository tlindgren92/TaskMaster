<div class="flex flex-wrap gap-2">
  <ng-container *ngIf="stats$ | async as s">
    <span class="px-2.5 py-1 rounded-full bg-gray-100 text-gray-700 text-sm">Total {{ s.total }}</span>
    <span class="px-2.5 py-1 rounded-full bg-green-100 text-green-700 text-sm">Completadas {{ s.completed }}</span>
    <span class="px-2.5 py-1 rounded-full bg-yellow-100 text-yellow-700 text-sm">Pendientes {{ s.pending }}</span>
    <span class="px-2.5 py-1 rounded-full bg-red-100 text-red-700 text-sm">Urgentes {{ s.urgent }}</span>
    <span class="px-2.5 py-1 rounded-full bg-indigo-100 text-indigo-700 text-sm">{{ s.rate }}%</span>
  </ng-container>
</div>
