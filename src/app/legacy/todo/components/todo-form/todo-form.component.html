<div class="bg-white rounded-lg shadow-sm border border-gray-200">
  <!-- Toggle Button -->
  <div *ngIf="!showForm" class="p-6">
    <button
      (click)="toggleForm()"
      class="w-full flex items-center justify-center px-4 py-3 border-2 border-dashed border-gray-300 rounded-lg text-gray-600 hover:border-indigo-400 hover:text-indigo-600 transition-colors duration-200">
      <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
      </svg>
      Agregar nueva tarea
    </button>
  </div>

  <!-- Form -->
  <div *ngIf="showForm" class="p-6">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold text-gray-800">Nueva Tarea</h3>
      <button
        (click)="toggleForm()"
        class="text-gray-400 hover:text-gray-600 transition-colors duration-200">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>

    <form (ngSubmit)="onSubmit()" class="space-y-4">
      <!-- Title -->
      <div>
        <label for="title" class="block text-sm font-medium text-gray-700 mb-2">Título *</label>
        <input
          id="title"
          type="text"
          [(ngModel)]="todoForm.title"
          name="title"
          required
          placeholder="¿Qué necesitas hacer?"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
      </div>

      <!-- Description -->
      <div>
        <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Descripción</label>
        <textarea
          id="description"
          [(ngModel)]="todoForm.description"
          name="description"
          rows="3"
          placeholder="Agrega detalles adicionales..."
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
      </div>

      <!-- Priority and Category Row -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Priority -->
        <div>
          <label for="priority" class="block text-sm font-medium text-gray-700 mb-2">Prioridad</label>
          <select
            id="priority"
            [(ngModel)]="todoForm.priority"
            name="priority"
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            <option *ngFor="let priority of priorities" [value]="priority.value">
              {{ priority.label }}
            </option>
          </select>
        </div>

        <!-- Category -->
        <div>
          <label for="category" class="block text-sm font-medium text-gray-700 mb-2">Categoría</label>
          <div class="relative">
            <input
              id="category"
              type="text"
              [(ngModel)]="todoForm.category"
              name="category"
              placeholder="Nueva categoría o existente..."
              list="categories"
              class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            <datalist id="categories">
              <option *ngFor="let category of categories" [value]="category"></option>
            </datalist>
          </div>
        </div>
      </div>

      <!-- Due Date -->
      <div>
        <label for="dueDate" class="block text-sm font-medium text-gray-700 mb-2">Fecha límite</label>
        <input
          id="dueDate"
          type="datetime-local"
          [(ngModel)]="todoForm.dueDate"
          name="dueDate"
          class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
      </div>

      <!-- Priority Preview -->
      <div *ngIf="todoForm.priority" class="flex items-center space-x-2">
        <span class="text-sm text-gray-600">Prioridad:</span>
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium {{ getPriorityColor(todoForm.priority) }}">
          {{ getPriorityLabel(todoForm.priority) }}
        </span>
      </div>

      <!-- Form Actions -->
      <div class="flex items-center justify-end space-x-3 pt-4">
        <button
          type="button"
          (click)="toggleForm()"
          class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
          Cancelar
        </button>
        <button
          type="submit"
          [disabled]="!todoForm.title.trim() || loading"
          class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 border border-transparent rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed">
          <span *ngIf="!loading">Crear Tarea</span>
          <span *ngIf="loading" class="flex items-center">
            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            Creando...
          </span>
        </button>
      </div>
    </form>
  </div>
</div>
