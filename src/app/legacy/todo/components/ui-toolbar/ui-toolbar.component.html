<div class="sticky top-0 z-40 backdrop-blur bg-white/80 border-b border-gray-200">
  <div class="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-xl font-semibold text-gray-800">{{ title }}</span>
    </div>
    <div class="flex items-center gap-2">
      <button type="button" (click)="newTask.emit()"
        class="px-3 py-2 rounded-md bg-indigo-600 text-white hover:bg-indigo-700 transition-colors">
        + Nueva tarea
      </button>
      <button type="button" (click)="openFilters.emit()"
        class="px-3 py-2 rounded-md bg-gray-100 text-gray-700 hover:bg-gray-200 transition-colors">
        Filtros
      </button>
    </div>
  </div>
</div>
