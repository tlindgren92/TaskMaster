<div class="grid grid-cols-1 md:grid-cols-4 gap-4">
  <!-- Total Tasks -->
  <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
    <div class="flex items-center">
      <div class="p-2 bg-blue-100 rounded-lg">
        <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
        </svg>
      </div>
      <div class="ml-4">
        <p class="text-sm font-medium text-gray-600">Total</p>
        <p class="text-2xl font-bold text-gray-900">{{ stats.total }}</p>
      </div>
    </div>
  </div>

  <!-- Completed Tasks -->
  <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
    <div class="flex items-center">
      <div class="p-2 bg-green-100 rounded-lg">
        <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <div class="ml-4">
        <p class="text-sm font-medium text-gray-600">Completadas</p>
        <p class="text-2xl font-bold text-gray-900">{{ stats.completed }}</p>
      </div>
    </div>
  </div>

  <!-- Pending Tasks -->
  <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
    <div class="flex items-center">
      <div class="p-2 bg-yellow-100 rounded-lg">
        <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
        </svg>
      </div>
      <div class="ml-4">
        <p class="text-sm font-medium text-gray-600">Pendientes</p>
        <p class="text-2xl font-bold text-gray-900">{{ stats.pending }}</p>
      </div>
    </div>
  </div>

  <!-- Urgent Tasks -->
  <div class="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
    <div class="flex items-center">
      <div class="p-2 bg-red-100 rounded-lg">
        <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
        </svg>
      </div>
      <div class="ml-4">
        <p class="text-sm font-medium text-gray-600">Urgentes</p>
        <p class="text-2xl font-bold text-gray-900">{{ stats.urgent }}</p>
      </div>
    </div>
  </div>
</div>

<!-- Progress Bar -->
<div *ngIf="stats.total > 0" class="mt-6 bg-white rounded-lg shadow-sm p-6 border border-gray-200">
  <div class="flex items-center justify-between mb-2">
    <h3 class="text-lg font-semibold text-gray-800">Progreso General</h3>
    <span class="text-sm font-medium text-gray-600">{{ stats.completionRate | number:'1.0-0' }}%</span>
  </div>
  <div class="w-full bg-gray-200 rounded-full h-3">
    <div
      class="h-3 rounded-full transition-all duration-300 ease-in-out {{ getProgressColor() }}"
      [style.width.%]="stats.completionRate">
    </div>
  </div>
</div>
