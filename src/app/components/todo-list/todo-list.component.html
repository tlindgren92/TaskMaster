<app-ui-toolbar (openFilters)="filtersOpen = true" title="TaskMaster"></app-ui-toolbar>

<div class="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 p-4">
  <div class="max-w-5xl mx-auto">
    <!-- Header simple + stats compactas -->
    <div class="mb-6">
      <div class="flex items-center justify-between mb-2">
        <h1 class="text-2xl font-semibold text-gray-800">Organiza tu vida</h1>
        <app-todo-stats-compact></app-todo-stats-compact>
      </div>
      <!-- Botón para abrir filtros en desktop también -->
      <div class="text-right">
        <button class="px-3 py-2 rounded-md bg-gray-100 text-gray-700 hover:bg-gray-200" (click)="filtersOpen = true">Mostrar filtros</button>
      </div>
    </div>

    <!-- Formulario para nueva tarea -->
    <app-todo-form class="mb-6"></app-todo-form>

    <!-- Estado de carga -->
    <div *ngIf="loading" class="flex justify-center items-center py-8">
      <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
    </div>

    <!-- Lista de tareas -->
    <div *ngIf="!loading" class="space-y-4">
      <div *ngIf="todos.length === 0" class="text-center py-12">
        <h3 class="text-lg font-medium text-gray-900 mb-2">No hay tareas</h3>
        <p class="text-gray-500">¡Comienza agregando tu primera tarea!</p>
      </div>

      <div *ngFor="let todo of todos" class="bg-white rounded-lg shadow-sm border border-gray-200 hover:shadow-md transition-shadow duration-200">
        <app-todo-item
          [todo]="todo"
          (toggleComplete)="onToggleComplete($event)"
          (delete)="onDeleteTodo($event)"
          (update)="onUpdateTodo($event)">
        </app-todo-item>
      </div>
    </div>

    <!-- Completadas en acordeón -->
    <div class="mt-8">
      <button class="flex items-center gap-2 text-gray-700 hover:text-gray-900" (click)="ui.toggleCompletedCollapsed()">
        <svg class="w-5 h-5" [class.rotate-90]="!ui.value.completedCollapsed" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M6 8l4 4 4-4" clip-rule="evenodd"/></svg>
        <span class="font-semibold">Tareas completadas ({{ getCompletedTodos().length }})</span>
      </button>
      <div *ngIf="!ui.value.completedCollapsed" class="mt-3 space-y-2">
        <div *ngFor="let todo of getCompletedTodos()" class="bg-gray-50 rounded-lg border border-gray-200">
          <app-todo-item
            [todo]="todo"
            (toggleComplete)="onToggleComplete($event)"
            (delete)="onDeleteTodo($event)"
            (update)="onUpdateTodo($event)">
          </app-todo-item>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Drawer de filtros -->
<app-ui-filters-drawer
  [open]="filtersOpen"
  [categories]="categories"
  (filtersChange)="onFiltersChange($event)"
  (clearFilters)="onClearFilters()"
  (close)="filtersOpen = false">
</app-ui-filters-drawer>
